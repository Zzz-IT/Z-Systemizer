name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Check
        run: cargo check --manifest-path cli/Cargo.toml

  webui:
    name: WebUI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify WebUI files
        run: |
          test -f module-template/webroot/index.html
          test -f module-template/webroot/app.js
          test -f module-template/webroot/style.css

      - name: Ensure WebUI is offline
        run: |
          if grep -R "http://" module-template/webroot; then
            echo "WebUI must not load remote insecure resources"
            exit 1
          fi

          if grep -R "https://" module-template/webroot; then
            echo "WebUI should be fully offline"
            exit 1
          fi

      - name: Ensure no APK artifacts
        run: |
          if find . -name "*.apk" | grep -q .; then
            echo "APK files must not be committed"
            exit 1
          fi
