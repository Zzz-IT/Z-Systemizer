name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Check
        run: cargo check --manifest-path cli/Cargo.toml

  webui:
    name: WebUI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build

      - name: Verify WebUI output
        run: |
          test -f webui/dist/index.html
          if grep -R "https://" webui/dist; then
            echo "WebUI should not depend on remote assets"
            exit 1
          fi

      - name: Ensure no APK artifacts
        run: |
          if find . -name "*.apk" | grep -q .; then
            echo "APK files must not be committed"
            exit 1
          fi

