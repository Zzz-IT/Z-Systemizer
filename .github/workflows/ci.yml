name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Check
        run: cargo check --manifest-path cli/Cargo.toml

  webui:
    name: WebUI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: |
          cd webui
          npm ci
          npm run build

      - name: Verify WebUI output
        run: |
          test -f webui/dist/index.html
          grep -q 'app-list' webui/dist/index.html
          grep -q 'empty-state' webui/dist/index.html
          grep -q 'status-line' webui/dist/index.html
          grep -q 'reboot-fab' webui/dist/index.html
          grep -q 'loading-state' webui/dist/index.html
          grep -R 'IntersectionObserver' webui/dist/assets
          grep -R 'ksu://icon' webui/dist/assets
          grep -R 'icon-loader' webui/dist/assets
          grep -R 'icon-fallback' webui/dist/assets
          grep -R 'refresh-description' webui/dist/assets
          grep -R '\.hidden' webui/dist/assets
          grep -R '\.empty-state' webui/dist/assets
          if grep -R "https://" webui/dist; then
            echo "WebUI should not depend on remote assets"
            exit 1
          fi
          if grep -R "backdrop-filter" webui/dist/assets; then
            echo "UI surfaces must not use backdrop-filter"
            exit 1
          fi
          if grep -R -- "--surface: rgba" webui/dist/assets; then
            echo "Surface colors must be opaque"
            exit 1
          fi

      - name: Ensure no APK artifacts
        run: |
          if find . -name "*.apk" | grep -q .; then
            echo "APK files must not be committed"
            exit 1
          fi

