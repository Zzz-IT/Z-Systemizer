name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-37" "build-tools;37.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.6.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Check Rust CLI
        run: |
          cargo fmt --manifest-path cli/Cargo.toml -- --check
          cargo clippy --manifest-path cli/Cargo.toml -- -D warnings
          cargo check --manifest-path cli/Cargo.toml

      - name: Build Android app
        run: gradle :app:assembleDebug --stacktrace

      - name: Build Rust CLI arm64
        run: |
          rustup target add aarch64-linux-android
          cd cli
          cargo ndk -t arm64-v8a build --release

      - name: Package artifacts
        run: |
          mkdir -p out module-template/bin/arm64-v8a
          cp app/build/outputs/apk/debug/app-debug.apk "out/Z-Systemizer-manager-${{ steps.version.outputs.VERSION }}-debug.apk"
          cp cli/target/aarch64-linux-android/release/systemizer module-template/bin/arm64-v8a/systemizer
          cd module-template
          zip -r "../out/Z-Systemizer-${{ steps.version.outputs.VERSION }}.zip" .

      - name: Verify module package
        run: |
          test -f "out/Z-Systemizer-${{ steps.version.outputs.VERSION }}.zip"
          unzip -l "out/Z-Systemizer-${{ steps.version.outputs.VERSION }}.zip" | grep 'bin/arm64-v8a/systemizer'

          if unzip -l "out/Z-Systemizer-${{ steps.version.outputs.VERSION }}.zip" | grep -q 'system/priv-app'; then
            echo 'priv-app path must not be packaged'
            exit 1
          fi

          if ! unzip -l "out/Z-Systemizer-${{ steps.version.outputs.VERSION }}.zip" | grep -q 'system/app'; then
            echo 'system/app path missing from package'
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Z-Systemizer-${{ steps.version.outputs.VERSION }}
          path: out/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Z-Systemizer-${{ steps.version.outputs.VERSION }}
          path: out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
