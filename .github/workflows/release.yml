name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Check Rust CLI
        run: |
          cargo fmt --manifest-path cli/Cargo.toml -- --check
          cargo check --manifest-path cli/Cargo.toml

      - name: Build Android App
        run: gradle :app:assembleDebug

      - name: Build Rust CLI arm64
        run: |
          rustup target add aarch64-linux-android
          cd cli
          cargo ndk -t arm64-v8a build --release

      - name: Package artifacts
        run: |
          mkdir -p out module-template/bin/arm64-v8a
          cp app/build/outputs/apk/debug/app-debug.apk out/Z-Systemizer-manager-v1.0.0-debug.apk
          cp cli/target/aarch64-linux-android/release/systemizer module-template/bin/arm64-v8a/systemizer
          cd module-template
          zip -r ../out/Z-Systemizer-v1.0.0.zip .

      - name: Verify module package
        run: |
          test -f out/Z-Systemizer-v1.0.0.zip
          unzip -l out/Z-Systemizer-v1.0.0.zip | grep 'bin/arm64-v8a/systemizer'
          if unzip -l out/Z-Systemizer-v1.0.0.zip | grep -q 'system/priv-app'; then
            echo 'priv-app path must not be packaged'
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Z-Systemizer-v1.0.0
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Z-Systemizer-v1.0.0
          path: out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
