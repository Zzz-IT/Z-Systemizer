name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build WebUI module
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Check Rust
        run: |
          cargo fmt --manifest-path cli/Cargo.toml -- --check
          cargo clippy --manifest-path cli/Cargo.toml -- -D warnings
          cargo check --manifest-path cli/Cargo.toml

      - name: Build Rust CLI arm64
        run: |
          rustup target add aarch64-linux-android
          cd cli
          cargo ndk -t arm64-v8a build --release

      - name: Assemble module
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          rm -rf out
          mkdir -p out
          mkdir -p module-template/bin/arm64-v8a
          mkdir -p module-template/system/app
          mkdir -p module-template/state
          mkdir -p module-template/checksums

          cp cli/target/aarch64-linux-android/release/systemizer \
            module-template/bin/arm64-v8a/systemizer

          chmod 0755 module-template/bin/arm64-v8a/systemizer

          test -f module-template/module.prop
          test -f module-template/customize.sh
          test -f module-template/webroot/index.html
          test -f module-template/webroot/app.js
          test -f module-template/webroot/style.css

          (
            cd module-template
            sha256sum bin/arm64-v8a/systemizer > checksums/SHA256SUMS
            sha256sum webroot/index.html >> checksums/SHA256SUMS
            sha256sum webroot/app.js >> checksums/SHA256SUMS
            sha256sum webroot/style.css >> checksums/SHA256SUMS
            zip -r "../out/Z-Systemizer-${VERSION}.zip" .
          )

      - name: Verify module zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ZIP="out/Z-Systemizer-${VERSION}.zip"

          test -f "$ZIP"

          unzip -l "$ZIP" | grep 'module.prop'
          unzip -l "$ZIP" | grep 'customize.sh'
          unzip -l "$ZIP" | grep 'bin/arm64-v8a/systemizer'
          unzip -l "$ZIP" | grep 'webroot/index.html'
          unzip -l "$ZIP" | grep 'webroot/app.js'
          unzip -l "$ZIP" | grep 'webroot/style.css'

          if unzip -l "$ZIP" | grep -q 'system/priv-app'; then
            echo 'priv-app path must not be packaged'
            exit 1
          fi

          if unzip -l "$ZIP" | grep -q '.apk'; then
            echo 'APK must not be packaged in WebUI release'
            exit 1
          fi

      - name: Generate release checksums
        run: |
          cd out
          sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
